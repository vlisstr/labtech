[defaults]
inventory             = inventory.ini
remote_user           = ansible
roles_path            = roles
host_key_checking     = False
retry_files_enabled   = False
stdout_callback       = yaml
gathering             = smart
forks                 = 10

[ssh_connection]
pipelining = True
ssh_args   = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null
