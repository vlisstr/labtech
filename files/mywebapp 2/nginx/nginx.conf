# nginx config for the containerised deployment.
# Mounted into the official nginx:alpine image at:
#   /etc/nginx/conf.d/default.conf

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    access_log /var/log/nginx/mywebapp_access.log;
    error_log  /var/log/nginx/mywebapp_error.log;

    # Root — list of business endpoints (HTML only).
    location = / {
        proxy_pass http://app:5200;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Business endpoints.
    location /items {
        proxy_pass http://app:5200;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Everything else is hidden from the outside world — health endpoints
    # are NOT exposed externally, per the spec of lab #1.
    location / {
        return 404;
    }
}
