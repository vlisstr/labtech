# Docker Compose stack installed at /opt/mywebapp/docker-compose.yml on the
# target node. Unlike the root docker-compose.yml (used for local dev), this
# file does not BUILD the app — it pulls the image that the CI pipeline pushed
# to GitHub Container Registry.
#
# The CD pipeline writes GITHUB_REPO and APP_TAG into /opt/mywebapp/.env
# before each restart.

services:
  db:
    image: mariadb:10.11
    container_name: mywebapp-db
    restart: unless-stopped
    networks: [mywebapp_net]
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE:      mywebapp
      MARIADB_USER:          mywebapp
      MARIADB_PASSWORD:      ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test:     ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 --silent"]
      interval: 5s
      timeout:  3s
      retries:  20
      start_period: 10s

  app:
    image: ghcr.io/${GITHUB_REPO}:${APP_TAG}
    container_name: mywebapp-app
    restart: unless-stopped
    networks: [mywebapp_net]
    depends_on:
      db:
        condition: service_healthy
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "5200"
      - "--db-host"
      - "db"
      - "--db-port"
      - "3306"
      - "--db-user"
      - "mywebapp"
      - "--db-password"
      - "${DB_PASSWORD}"
      - "--db-name"
      - "mywebapp"

  nginx:
    image: nginx:1.27-alpine
    container_name: mywebapp-nginx
    restart: unless-stopped
    networks: [mywebapp_net]
    depends_on: [app]
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  mywebapp_net:
    name: mywebapp_net
    driver: bridge

volumes:
  db_data:
    name: mywebapp_db_data
